name: Briar-Android

on:
  workflow_dispatch:
    inputs:
      VERSION:
        description: "VERSION"
        required: true

run-name: "Check ${{ github.workflow }} v${{ inputs.VERSION }} reproducibility"

jobs:
  website-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Dockerfile
        run: |
          sudo apt update && sudo apt install -y fuse
          git clone https://github.com/BarbossHack/briar-reproducer -b barboss-hack-update-reproducer --depth 1
          docker build -t briar/reproducer briar-reproducer
      - name: Reproducible
        run: |
          sudo docker run --privileged --device /dev/fuse --name reproducer briar/reproducer:latest ./reproduce.py briar release-${{ inputs.VERSION }}
          sudo docker cp reproducer:/opt/briar-reproducer/briar/briar-android/build/outputs/apk/official/release/briar-android-official-release-unsigned.apk build.apk
          sudo docker cp reproducer:/opt/briar-reproducer/briar-${{ inputs.VERSION }}.apk official.apk
          sudo chmod 666 *.apk
      - name: Signal Apkdiff
        run: |
          pip install uv
          git clone https://github.com/signalapp/Signal-Android --depth 1
          cd Signal-Android/reproducible-builds/apkdiff
          uv sync
          zip -d ../../../official.apk "META-INF/*"
          zip -d ../../../build.apk "META-INF/*"
          uv run apkdiff.py ../../../official.apk ../../../build.apk

  playstore-verify:
    needs: website-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download website APK
        run: |
          curl -sL https://briarproject.org/apk/briar-${{ inputs.VERSION }}.apk -o briar.apk
          AAPT_BADGING=$(/usr/local/lib/android/sdk/build-tools/36.1.0/aapt dump badging briar.apk)
          VERSION_CODE=$(echo "$AAPT_BADGING" | grep -o "versionCode='[^']*'" | cut -d"'" -f2)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
      - name: Download Play Store APK
        run: |
          cargo build --manifest-path gpapi/Cargo.toml --release
          ./gpapi/target/release/gpapi --email "${{ secrets.EMAIL }}" --aas-token "${{ secrets.AAS_TOKEN }}" --package "org.briarproject.briar.android" --version-code ${{ env.VERSION_CODE }} --output=./playstore/
      - name: Signal Apkdiff
        run: |
          pip install uv
          git clone https://github.com/signalapp/Signal-Android --depth 1
          cd Signal-Android/reproducible-builds/apkdiff
          uv sync
          zip -d ../../../briar.apk "META-INF/*"
          zip -d ../../../playstore/org.briarproject.briar.android.apk "META-INF/*"
          uv run apkdiff.py ../../../briar.apk ../../../playstore/org.briarproject.briar.android.apk

  notify:
    needs: [website-verify, playstore-verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: BarbossHack/reproducible/.github/actions/discord-webhook@master
        with:
          VERSION: ${{ inputs.VERSION }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          needs: ${{ toJSON(needs) }}
