name: SimpleX-Android

on:
  workflow_dispatch:
    inputs:
      VERSION:
        description: "VERSION"
        required: true

run-name: "Check ${{ github.workflow }} v${{ inputs.VERSION }} reproducibility"

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Build
        run: |
          export PATH="$PATH:/usr/sbin:/sbin"
          curl -LO "https://raw.githubusercontent.com/simplex-chat/simplex-chat/refs/heads/master/scripts/simplex-chat-reproduce-builds-android.sh"
          chmod +x simplex-chat-reproduce-builds-android.sh
          yes | ./simplex-chat-reproduce-builds-android.sh "v${{ inputs.VERSION }}" || yes | ./simplex-chat-reproduce-builds-android.sh "v${{ inputs.VERSION }}"
          ls -Rlsah
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: ./v${{ inputs.VERSION }}-simplex-chat/

  check:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
      - name: Check sha256sums
        run: |
          if [ -f "v${{ inputs.VERSION }}-simplex-chat/_sha256sums" ]; then
            echo "Reproducible"
            exit 0
          else
            echo "Not reproducible"
            exit 1
          fi

  diff:
    needs: check
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
      - name: Print hashes
        run: |
          echo "sha256 from-source"
          sha256sum ./v${{ inputs.VERSION }}-simplex-chat/from-source/*
          echo "sha256 prebuilt"
          sha256sum ./v${{ inputs.VERSION }}-simplex-chat/prebuilt/*
      - name: Diffoscope
        run: |
          for file in ./v${{ inputs.VERSION }}-simplex-chat/prebuilt/*; do
            filename=$(basename "$file")
            docker run --rm -w $(pwd) -v $(pwd):$(pwd) registry.salsa.debian.org/reproducible-builds/diffoscope --no-progress --exclude-command objdump --exclude-command readelf --exclude-command strings --exclude-command zipdetails --exclude-command xxd "v${{ inputs.VERSION }}-simplex-chat/from-source/$filename" "v${{ inputs.VERSION }}-simplex-chat/prebuilt/$filename" || true
          done
