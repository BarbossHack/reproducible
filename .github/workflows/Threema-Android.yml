name: Threema-Android

on:
  workflow_dispatch:
    inputs:
      VERSION:
        description: "VERSION"
        required: true

run-name: "Check ${{ github.workflow }} v${{ inputs.VERSION }} reproducibility"

env:
  SIGNATURE_SHA256: 269d600e1ce7e0a7ffddb18fb92251092938f5be38ea1113e29213564b32cb44

jobs:
  website-verify:
    runs-on: ubuntu-latest
    steps:
      - name: aapt
        run: echo "PATH=$PATH:/usr/local/lib/android/sdk/build-tools/37.0.0" >> $GITHUB_ENV
      - name: Official
        id: download
        run: |
          curl -L "https://github.com/BarbossHack/reproducible-LFS/raw/refs/heads/master/Threema-Android/${{ inputs.VERSION }}.apk" -o Threema.apk
          AAPT_BADGING=$(aapt dump badging Threema.apk)
          VERSION_CODE=$(echo "$AAPT_BADGING" | grep -o "versionCode='[^']*'" | cut -d"'" -f2)
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          apksigner verify -v --print-certs --min-sdk-version 24 Threema.apk | grep $SIGNATURE_SHA256
      - name: Dockerfile
        run: |
          git clone https://github.com/threema-ch/threema-android --depth 1 -b "${{ inputs.VERSION }}-${{ env.VERSION_CODE }}"
          cd threema-android
          rm -rf .git
          export RUST_VERSION=$(grep "channel = " "./domain/libthreema/rust-toolchain.toml" | cut -d= -f2 | xargs)
          cd scripts
          docker build --build-arg RUST_VERSION=$RUST_VERSION -t docker.io/threema/android-compile:${{ env.VERSION_CODE }} .
      - name: Build
        run: |
          ./threema-android/scripts/build-release.sh -v threemashop_private --no-image-export --i-accept-the-android-sdk-license
          ls -Rlsah threema-android/release
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-website
          path: threema-android/release/${{ inputs.VERSION }}-${{ env.VERSION_CODE }}/threemashop_private/app-store_threema-universal-release-unsigned.apk
      - name: Apkdiff
        run: |
          ./threema-android/scripts/verify-build.sh -n "${{ inputs.VERSION }}-${{ env.VERSION_CODE }}" -v threemashop_private -p Threema.apk
      - uses: BarbossHack/reproducible/.github/actions/apkdiff@master
        with:
          APKS_A: threema-android/release/${{ inputs.VERSION }}-${{ env.VERSION_CODE }}/threemashop_private/app-store_threema-universal-release-unsigned.apk
          APKS_B: Threema.apk
          IGNORE_FILES: |-
            META-INF/ANDROID_.RSA
            META-INF/ANDROID_.SF
    outputs:
      VERSION_CODE: ${{ steps.download.outputs.VERSION_CODE }}

  playstore-verify:
    needs: website-verify
    if: always() && needs.website-verify.outputs.VERSION_CODE != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download Play Store APK
        run: |
          cargo build --manifest-path gpapi/Cargo.toml --release
          ./gpapi/target/release/gpapi --email "${{ secrets.EMAIL }}" --aas-token "${{ secrets.AAS_TOKEN }}" --package "ch.threema.app" --version-code ${{ needs.website-verify.outputs.VERSION_CODE }} --output=./playstore/ --download
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: playstore-official
          path: playstore/ch.threema.app.apk
      - name: Dockerfile
        run: |
          git clone https://github.com/threema-ch/threema-android --depth 1 -b "${{ inputs.VERSION }}-${{ needs.website-verify.outputs.VERSION_CODE }}"
          cd threema-android
          rm -rf .git
          export RUST_VERSION=$(grep "channel = " "./domain/libthreema/rust-toolchain.toml" | cut -d= -f2 | xargs)
          cd scripts
          docker build --build-arg RUST_VERSION=$RUST_VERSION -t docker.io/threema/android-compile:${{ needs.website-verify.outputs.VERSION_CODE }} .
      - name: Build
        run: ./threema-android/scripts/build-release.sh -v googleplay_private --no-image-export --i-accept-the-android-sdk-license
      - run: find . -name "*.apk"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: playstore-build
          path: threema-android/release/${{ inputs.VERSION }}-${{ needs.website-verify.outputs.VERSION_CODE }}/googleplay_private/app-store_threema-universal-release-unsigned.apk
      - name: Threema Verify Build
        run: |
          ./threema-android/scripts/verify-build.sh -n "${{ inputs.VERSION }}-${{ needs.website-verify.outputs.VERSION_CODE }}" -v googleplay_private -p Threema.apk
      - uses: BarbossHack/reproducible/.github/actions/apkdiff@master
        with:
          APKS_A: playstore/ch.threema.app.apk
          APKS_B: threema-android/release/${{ inputs.VERSION }}-${{ needs.website-verify.outputs.VERSION_CODE }}/googleplay_private/app-store_threema-universal-release-unsigned.apk

  notify:
    needs: [website-verify, playstore-verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: BarbossHack/reproducible/.github/actions/discord-webhook@master
        with:
          VERSION: ${{ inputs.VERSION }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          needs: ${{ toJSON(needs) }}
