name: SimpleX-Server

on:
  workflow_dispatch:
    inputs:
      VERSION:
        description: "VERSION"
        required: true

run-name: "Check ${{ github.workflow }} v${{ inputs.VERSION }} reproducibility"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        run: |
          curl -LO "https://raw.githubusercontent.com/simplex-chat/simplexmq/refs/tags/v${{ inputs.VERSION }}/scripts/simplexmq-reproduce-builds.sh"
          chmod +x simplexmq-reproduce-builds.sh
          ./simplexmq-reproduce-builds.sh "v${{ inputs.VERSION }}"
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: ./v${{ inputs.VERSION }}-simplexmq/

  check:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
      - name: Check hashes
        run: |
          if [ -f "v${{ inputs.VERSION }}-simplexmq/_sha256sums" ]; then
            echo "Reproducible"
            exit 0
          else
            echo "Not reproducible"
            exit 1
          fi

  diff:
    needs: check
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
      - name: Install dependencies
        run: sudo apt-get install -y binutils
      - name: Print hashes
        run: |
          echo "sha256 from-source"
          sha256sum ./v${{ env.VERSION }}-simplexmq/from-source/*
          echo "sha256 prebuilt"
          sha256sum ./v${{ env.VERSION }}-simplexmq/prebuilt/*
      - name: .comment section diff
        run: |
          readelf --wide --decompress --string-dump=.comment ./v${{ inputs.VERSION }}-simplexmq/from-source/smp-server-ubuntu-24_04-x86-64 > comment_source || true
          readelf --wide --decompress --string-dump=.comment ./v${{ inputs.VERSION }}-simplexmq/prebuilt/smp-server-ubuntu-24_04-x86-64 > comment_prebuilt || true
          diff -u comment_source comment_prebuilt || true
      - name: full readelf diff
        run: |
          readelf -a ./v${{ inputs.VERSION }}-simplexmq/from-source/smp-server-ubuntu-24_04-x86-64 > readelf_source || true
          readelf -a ./v${{ inputs.VERSION }}-simplexmq/prebuilt/smp-server-ubuntu-24_04-x86-64 > readelf_prebuilt || true
          diff -u readelf_source readelf_prebuilt || true

  notify:
    needs: [check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: BarbossHack/reproducible/.github/actions/discord-webhook@master
        with:
          VERSION: ${{ inputs.VERSION }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          needs: ${{ toJSON(needs) }}
