name: Telegram-iOS

on:
  workflow_dispatch:
    inputs:
      VERSION:
        description: "VERSION"
        required: true

run-name: "Check ${{ github.workflow }} v${{ inputs.VERSION }} reproducibility"

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: build
        run: |
          echo DEVELOPER_DIR=/Applications/Xcode_26.2.app/Contents/Developer >> "$GITHUB_ENV"
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          git clone --depth 1 --recursive https://github.com/TelegramMessenger/Telegram-iOS -b release-12.7
          cd Telegram-iOS
          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs
          python3 -u build-system/Make/Make.py build --buildNumber 2720 --configurationPath="build-system/appstore-configuration.json" --codesigningInformationPath=build-system/fake-codesigning --configuration=release_arm64 --outputBuildArtifactsPath=./build/artifacts
          mkdir -p ./output_ipa/
          cp ./build/artifacts/Telegram.ipa ./output_ipa/
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: output_ipa
          path: ./Telegram-iOS/output_ipa/
