name: custom

on:
  workflow_dispatch:

run-name: "custom"

jobs:
  website-download:
    runs-on: self-hosted
    steps:
      - run: |
          set -x
          id || true
          uname -a || true
          pwd || true
          free || true
          top -n 1 || true
          df -h || true
          curl ipinfo.io || true
          timeout 5 sudo id || true
